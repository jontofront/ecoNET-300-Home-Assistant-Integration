name: Pre-commit Validation

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  validation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pre-commit
        pip install -r requirements_test.txt

    - name: Install pre-commit hooks
      run: |
        pre-commit install

    - name: Run translation validation
      run: |
        python tests/validation/check_translations.py

    - name: Run Python syntax checks
      run: |
        python -m py_compile custom_components/econet300/const.py
        python -m py_compile custom_components/econet300/number.py
        python -m py_compile custom_components/econet300/sensor.py
        python -m py_compile custom_components/econet300/binary_sensor.py
        python -m py_compile custom_components/econet300/switch.py

    - name: Run JSON syntax checks
      run: |
        python -c "import json; json.load(open('custom_components/econet300/strings.json'))"
        python -c "import json; json.load(open('custom_components/econet300/translations/en.json'))"
        python -c "import json; json.load(open('custom_components/econet300/translations/pl.json'))"

    - name: Run pre-commit on all files
      run: |
        pre-commit run --all-files

    - name: Run Ruff linting
      run: |
        python -m ruff check custom_components/econet300/

    - name: Run Ruff formatting check
      run: |
        python -m ruff format --check custom_components/econet300/
